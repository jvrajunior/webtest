name: Security Pipeline

on:
  pull_request:
    branches: ["**"]
    types: [opened, synchronize, reopened]
    workflow_dispatch:
    schedule:
        - cron: '0 8 * * *'

concurrency:
  group: security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:

  security-scan:
    uses: jvrajunior/appsec-pipeline-backup/.github/workflows/appsec-pipeline.yml@master
    secrets: inherit
    with:
      mobile: false
